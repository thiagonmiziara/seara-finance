<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none" role="img" aria-label="Finzap">
  <defs>
    <linearGradient id="fz-icon-bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#214b94" />
      <stop offset="100%" stop-color="#152f5e" />
    </linearGradient>
  </defs>

  <!-- icon -->
  <g transform="translate(0,0)">
    <rect width="64" height="64" rx="15" fill="url(#fz-icon-bg)" />
    <path d="M 22 16 H 46 A 6 6 0 0 1 52 22 V 38 A 6 6 0 0 1 46 44 H 31 L 22 51 V 44 A 6 6 0 0 1 16 38 V 22 A 6 6 0 0 1 22 16 Z" fill="#FFFFFF" />
    <polyline points="22,38 28,32 33,35 41,25" stroke="#C89619" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <polyline points="38,25 41,25 41,28" stroke="#C89619" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="22" cy="38" r="1.6" fill="#C89619" />
  </g>

  <!-- wordmark -->
  <g transform="translate(80, 22)" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, sans-serif" font-weight="800">
    <text x="0" y="22" font-size="32" letter-spacing="-1.4" fill="currentColor">finzap</text>
    <!-- gold accent dot replacing the dot of 'i' -->
    <circle cx="32" cy="-6" r="3.2" fill="#C89619" />
    <!-- small underline accent -->
    <rect x="0" y="32" width="20" height="2.4" rx="1.2" fill="#C89619" />
  </g>
</svg>
