<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Finzap">
  <defs>
    <linearGradient id="finzap-bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#214b94" />
      <stop offset="100%" stop-color="#152f5e" />
    </linearGradient>
    <linearGradient id="finzap-bubble" x1="18" y1="16" x2="48" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#EEF4FC" />
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="64" height="64" rx="15" fill="url(#finzap-bg)" />

  <!-- soft top-left highlight -->
  <rect x="2" y="2" width="60" height="30" rx="13" fill="white" fill-opacity="0.05" />

  <!-- chat bubble -->
  <path d="M 22 16 H 46 A 6 6 0 0 1 52 22 V 38 A 6 6 0 0 1 46 44 H 31 L 22 51 V 44 A 6 6 0 0 1 16 38 V 22 A 6 6 0 0 1 22 16 Z"
        fill="url(#finzap-bubble)" />

  <!-- rising trend line in champagne gold -->
  <polyline points="22,38 28,32 33,35 41,25"
            stroke="#C89619" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- arrow head -->
  <polyline points="38,25 41,25 41,28"
            stroke="#C89619" stroke-width="2.6"
            stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- gold dot accent -->
  <circle cx="22" cy="38" r="1.6" fill="#C89619" />
</svg>
