# Local Evolution API + Postgres + Redis + bot.
# Spin up:
#   cd docker && cp .env.example .env && docker compose up -d
# Then:
#   curl -X POST http://localhost:8080/instance/create \
#     -H "apikey: $EVOLUTION_API_KEY" \
#     -H "Content-Type: application/json" \
#     -d '{"instanceName":"dev","qrcode":true,"integration":"WHATSAPP-BAILEYS"}'
# Open http://localhost:8080/manager and scan the QR code.

name: saas-financas-evolution

services:
  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution}
      POSTGRES_DB: ${POSTGRES_DB:-evolution}
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-evolution}']
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - evolution-redis-data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    environment:
      # ── server
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080
      LANGUAGE: pt-BR
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      LOG_COLOR: 'true'
      DEL_INSTANCE: 'false'
      # ── auth
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      # ── database
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-evolution}:${POSTGRES_PASSWORD:-evolution}@evolution-postgres:5432/${POSTGRES_DB:-evolution}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_local
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'
      # ── cache
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: 'false'
      CACHE_LOCAL_ENABLED: 'false'
      # ── webhook (global -> our bot)
      WEBHOOK_GLOBAL_ENABLED: 'true'
      # Bot agora roda nativo no host (acesso direto a Ollama+Whisper).
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3001/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'false'
      WEBHOOK_EVENTS_APPLICATION_STARTUP: 'false'
      WEBHOOK_EVENTS_QRCODE_UPDATED: 'true'
      WEBHOOK_EVENTS_MESSAGES_SET: 'false'
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPDATE: 'true'
      WEBHOOK_EVENTS_MESSAGES_DELETE: 'false'
      WEBHOOK_EVENTS_SEND_MESSAGE: 'false'
      WEBHOOK_EVENTS_CONTACTS_SET: 'false'
      WEBHOOK_EVENTS_CONTACTS_UPSERT: 'false'
      WEBHOOK_EVENTS_CONTACTS_UPDATE: 'false'
      WEBHOOK_EVENTS_PRESENCE_UPDATE: 'false'
      WEBHOOK_EVENTS_CHATS_SET: 'false'
      WEBHOOK_EVENTS_CHATS_UPSERT: 'false'
      WEBHOOK_EVENTS_CHATS_UPDATE: 'false'
      WEBHOOK_EVENTS_CHATS_DELETE: 'false'
      WEBHOOK_EVENTS_GROUPS_UPSERT: 'false'
      WEBHOOK_EVENTS_GROUP_UPDATE: 'false'
      WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE: 'false'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      WEBHOOK_EVENTS_CALL: 'false'
      WEBHOOK_EVENTS_NEW_JWT_TOKEN: 'false'
      # ── QR + manager
      QRCODE_LIMIT: '30'
      QRCODE_COLOR: '#214b94'
      # CONFIG_SESSION_PHONE_VERSION removido — deixe a Evolution detectar
      # CONFIG_SESSION_PHONE_CLIENT / NAME idem (ficar no default para evitar loop de reconexão)
    ports:
      - '8080:8080'
    volumes:
      - evolution-api-instances:/evolution/instances
      - evolution-api-store:/evolution/store

  # bot: agora roda NATIVO no host (não em container) — acesso direto a
  # localhost:11434 (Ollama) e whisper-cli (binário do brew).
  # Pra subir: cd bot && npm install && npm run start
  # Evolution chama via WEBHOOK_GLOBAL_URL=http://host.docker.internal:3001/webhook

volumes:
  evolution-postgres-data:
  evolution-redis-data:
  evolution-api-instances:
  evolution-api-store:
